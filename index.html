<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童服事數據分析平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',Arial,sans-serif; background:#f1f5f9; color:#0f172a; display:flex; min-height:100vh; }
#sidebar { width:210px;min-width:210px;background:#0f172a;color:white;padding:1.25rem;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto; }
.logo { display:flex;align-items:center;gap:.75rem;margin-bottom:2rem; }
.logo-icon { background:#3b82f6;padding:.5rem;border-radius:.75rem;display:flex; }
.logo h1 { font-size:.95rem;font-weight:900;line-height:1.3; }
.logo span { color:#60a5fa;font-size:.65rem; }
.nav-btn { display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:.75rem;border:none;cursor:pointer;width:100%;text-align:left;font-size:.85rem;background:transparent;color:#94a3b8;margin-bottom:.25rem;font-family:inherit; }
.nav-btn.active { background:#2563eb;color:white;font-weight:700; }
.stat-box { background:#1e293b;border-radius:.75rem;padding:.875rem;margin-bottom:.875rem; }
.stat-label { font-size:.6rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:.25rem; }
.stat-value { font-size:1.6rem;font-weight:900; }
.clear-btn { display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.625rem;background:rgba(239,68,68,.1);color:#ef4444;border-radius:.75rem;border:none;cursor:pointer;font-size:.7rem;font-weight:700;font-family:inherit; }
.sidebar-bottom { margin-top:auto;padding-top:1rem;border-top:1px solid #1e293b; }
#main { flex:1;padding:2rem 2.5rem;overflow-y:auto;min-width:0; }
.page-title { font-size:1.75rem;font-weight:900;margin-bottom:1.25rem; }
.toolbar { display:flex;flex-wrap:wrap;align-items:center;gap:.625rem;margin-bottom:1.75rem; }
.sel-wrap { display:flex;align-items:center;gap:.5rem;background:white;border:2px solid #e2e8f0;border-radius:.875rem;padding:.5rem .875rem; }
.sel-wrap select { background:transparent;border:none;outline:none;font-weight:700;color:#334155;cursor:pointer;font-size:.875rem;font-family:inherit; }
.toolbar-right { margin-left:auto;display:flex;gap:.625rem; }
.btn { padding:.625rem 1.25rem;border-radius:.875rem;border:none;cursor:pointer;font-weight:700;font-size:.8rem;font-family:inherit;display:flex;align-items:center;gap:.375rem; }
.btn-green { background:#059669;color:white; }
.btn-blue  { background:#3b82f6;color:white; }
.mode-toggle { display:flex;gap:.25rem;background:#f1f5f9;padding:.25rem;border-radius:.625rem; }
.mode-btn { padding:.375rem .75rem;border-radius:.375rem;border:none;cursor:pointer;background:transparent;color:#94a3b8;font-size:.75rem;font-weight:700;font-family:inherit; }
.mode-btn.active { background:white;color:#3b82f6; }
.empty { margin-top:3rem;padding:3.5rem;border:3px dashed #e2e8f0;border-radius:2rem;text-align:center; }
.empty h3 { font-size:1.1rem;font-weight:900;color:#94a3b8;margin-top:.75rem; }
.empty p { color:#cbd5e1;margin-top:.375rem;font-size:.8rem; }
/* Charts */
.grid-2 { display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:1.5rem;margin-bottom:1.5rem; }
.grid-3 { display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:1.5rem; }
.cc { background:white;border-radius:1.5rem;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06); }
.cc-hd { display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem; }
.cc-title { font-weight:900;font-size:.95rem; }
.cc-sub   { font-size:.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em; }
.cw     { position:relative;height:220px; }
.cw-md  { position:relative;height:260px; }
/* Tables */
.tbl-wrap { background:white;border-radius:1.5rem;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06); }
.dtbl { width:100%;border-collapse:collapse; }
.dtbl th { padding:.875rem 1rem;text-align:left;font-weight:900;font-size:.68rem;color:#94a3b8;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #f1f5f9; }
.dtbl td { padding:.75rem 1rem;border-top:1px solid #f1f5f9;font-size:.85rem; }
.dtbl tr:nth-child(even) td { background:#fafafa; }
.badge { padding:.15rem .5rem;border-radius:999px;font-size:.68rem;font-weight:900; }
.b-s { background:#d1fae5;color:#065f46; }
.b-o { background:#fef3c7;color:#92400e; }
.b-r { background:#fee2e2;color:#991b1b; }
/* Modal */
.mov { display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;align-items:center;justify-content:center;padding:1.5rem; }
.mov.open { display:flex; }
.modal { background:white;width:100%;max-width:24rem;border-radius:1.5rem;padding:2rem; }
.mhd { display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem; }
.modal h3 { font-size:1.1rem;font-weight:900; }
.modal input { width:100%;background:#f8fafc;border:2px solid #e2e8f0;border-radius:.875rem;padding:.875rem;outline:none;font-size:.875rem;margin-bottom:.875rem;font-family:inherit; }
.modal p { font-size:.7rem;color:#94a3b8;margin-bottom:.875rem; }
.xbtn { padding:.375rem;background:#f1f5f9;border-radius:.625rem;border:none;cursor:pointer; }
/* Pie legend */
.ple { display:flex;justify-content:center;gap:1.25rem;margin-top:.5rem;flex-wrap:wrap;font-size:.75rem;font-weight:600;color:#64748b; }
.pd { width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:.3rem;vertical-align:middle; }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="logo">
    <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
    <h1>兒童服事<br><span>數據分析平台</span></h1>
  </div>
  <button class="nav-btn active">📋 兒童普查統計</button>
  <div class="sidebar-bottom">
    <div class="stat-box">
      <div class="stat-label">顯示人數</div>
      <div class="stat-value" id="stat-value">0</div>
    </div>
    <button class="clear-btn" onclick="clearAll()">🗑 清空數據</button>
  </div>
</nav>

<main id="main">
  <h2 class="page-title">兒童普查分析</h2>

  <div class="toolbar">
    <div class="sel-wrap"><span>🔍</span><select id="zone-sel" onchange="onZoneChange()"><option value="全部地區">全部區域</option></select></div>
    <div class="sel-wrap" id="sub-wrap" style="display:none"><span>📍</span><select id="sub-sel" onchange="renderCensus()"><option value="全區">全區</option></select></div>
    <div class="sel-wrap"><span>🌡</span><select id="life-sel" onchange="renderCensus()"><option value="全部狀態">全部穩定度</option><option>穩定</option><option>偶爾</option><option>幾乎不來</option></select></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="m-ch" onclick="setMode('charts')">📊 圖表</button>
      <button class="mode-btn" id="m-tbl" onclick="setMode('table')">📋 列表</button>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-green" onclick="document.getElementById('sheet-modal').classList.add('open')">🔗 試算表</button>
      <button class="btn btn-blue" onclick="document.getElementById('fin').click()">⬆ 匯入 Excel</button>
    </div>
    <input type="file" id="fin" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this)">
  </div>

  <div class="empty" id="cen-empty"><div style="font-size:2.5rem">📂</div><h3>尚無普查數據，請匯入兒童普查 xlsx</h3><p>支援雲嘉兒童普查多工作表格式</p></div>
  <div id="cen-cnt" style="display:none">
    <div id="cen-ch">
      <div class="grid-3">
        <div class="cc"><div class="cc-hd"><span>📚</span><div><div class="cc-title">學齡梯隊</div><div class="cc-sub">依年齡</div></div></div><div class="cw"><canvas id="c-grade"></canvas></div></div>
        <div class="cc"><div class="cc-hd"><span>🏠</span><div><div class="cc-title" id="church-title">各照顧區人數</div><div class="cc-sub" id="church-sub">依照顧區彙總</div></div></div><div class="cw"><canvas id="c-church"></canvas></div></div>
        <div class="cc"><div class="cc-hd"><span>⚡</span><div><div class="cc-title">穩定度分布</div></div></div><div class="cw" style="height:180px"><canvas id="c-stable"></canvas></div><div class="ple" id="ple"></div></div>
      </div>
      <div class="grid-2">
        <div class="cc"><div class="cc-hd"><span>👨‍👩‍👧</span><div><div class="cc-title">家長背景影響</div></div></div><div class="cw-md"><canvas id="c-parent"></canvas></div></div>
        <div class="cc"><div class="cc-hd"><span>📉</span><div><div class="cc-title">年齡穩定度比較</div></div></div><div class="cw-md"><canvas id="c-gloss"></canvas></div></div>
      </div>
    </div>
    <div id="cen-tbl" style="display:none"><div class="tbl-wrap"><table class="dtbl"><thead><tr><th>姓名</th><th>年級</th><th>召會</th><th>穩定度</th><th>父母</th></tr></thead><tbody id="cen-tbody"></tbody></table></div></div>
  </div>
</main>

<div class="mov" id="sheet-modal">
  <div class="modal">
    <div class="mhd"><h3>連結 Google 試算表</h3><button class="xbtn" onclick="document.getElementById('sheet-modal').classList.remove('open')">✕</button></div>
    <input type="text" id="sheet-url" placeholder="貼入 Google 試算表連結...">
    <p>請確認試算表已設為「知道連結者皆可檢視」</p>
    <button class="btn btn-green" style="width:100%;padding:.875rem;border-radius:.875rem;font-size:.875rem;justify-content:center" onclick="importGS()">同步數據</button>
  </div>
</div>

<script>
// ════ 常數 ════
const CARE_ZONES = {
  '雲東照顧區': ['斗六','古坑','林內','西螺','莿桐','斗南'],
  '雲西照顧區': ['虎尾','土庫','北港','口湖','崙背','褒忠','二崙','麥寮'],
  '朴子照顧區': ['朴子','布袋','鹿草','太保','水上'],
  '嘉義照顧區': ['嘉義','中埔','竹崎','番路','梅山'],
  '民雄照顧區': ['民雄','六腳','溪口','大林','新港'],
};
const CHIAYI_SUBS = ['中正','林森','新東','忠孝','永安','建成','新城','兒童','文雅','慈保','日新','北園','港坪','興美','永福','臺語'];
const ALL_KNOWN = [...Object.values(CARE_ZONES).flat(), ...CHIAYI_SUBS];
const CENSUS_TARGET = ['雲東照顧區','雲西照顧區','朴子照顧區','嘉義照顧區-嘉義市一三五大區','嘉義二四大區','嘉義照顧區-嘉義縣','民雄照顧區'];

// ════ State ════
let censusData = [];
let curMode = 'charts';
let charts = {};

// ════ Helpers ════
const getZone = ch => { for(const[z,l] of Object.entries(CARE_ZONES)) if(l.some(s=>ch.includes(s))) return z; if(CHIAYI_SUBS.some(s=>ch.includes(s))) return '嘉義照顧區'; return '未歸類'; };
const mapGrade = a => { if(isNaN(a)||a<0||a>14) return '未知'; if(a<=6) return '學齡前'; if(a<=12) return `${a-6}年級`; return a===13?'國一':null; };
function detectGradeCols(hd){
  const cols=[];
  const AGE_PAT=/^(\d+)歲/;
  const GRD_PAT=/^([一二三四五六])年級/;
  hd.forEach((h,i)=>{
    const clean=h.replace(/\n/g,' ').trim();
    const am=clean.match(AGE_PAT);
    if(am){ const a=parseInt(am[1]); cols.push({col:i,label:a<=6?'學齡前':`${a}歲`,age:a}); return; }
    const gm=clean.match(GRD_PAT);
    if(gm){ const kanji={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6}; const n=kanji[gm[1]]; cols.push({col:i,label:n+'年級',age:null}); }
  });
  return cols;
}
function gradeFromRow(row, gradeCols){
  for(const {col,label} of gradeCols){
    const v=String(row[col]||'').trim();
    if(v&&v!=='0'&&v!=='---'&&v!=='-') return label;
  }
  return null;
}
const isSaved = v => { const s=String(v||'').trim(); if(!s||s==='0') return false; if(['否','未','福','外','朋友','不'].some(w=>s.includes(w))) return false; return ['是','已','v','V','y','Y','1','得救','聖徒','弟兄','姊妹','主內','受浸'].some(w=>s.includes(w)); };
const findC = (hd,al,ex=[]) => { let i=hd.findIndex(h=>al.some(a=>h===a)); if(i!==-1) return i; return hd.findIndex(h=>al.some(a=>h.includes(a))&&!ex.some(e=>h.includes(e))); };

const gSelZ = () => document.getElementById('zone-sel').value;
const gSelS = () => document.getElementById('sub-sel').value;
const gSelL = () => document.getElementById('life-sel').value;

function filtCensus(){
  let d=censusData; const z=gSelZ(),s=gSelS(),l=gSelL();
  if(z!=='全部地區'){ d=d.filter(r=>getZone(r.church)===z); if(s!=='全區') d=d.filter(r=>r.church===s||r.church.includes(s)); }
  if(l!=='全部狀態') d=d.filter(r=>r.lifeLevel===l);
  return d;
}

// ════ Excel 解析 — 普查 ════
function parseCensus(ws, sn, XLSX){
  const raw=XLSX.utils.sheet_to_json(ws,{header:1});
  if(!raw.length) return [];
  const hd=raw[0].map(h=>String(h||'').replace(/\n/g,' ').trim());
  const ni=findC(hd,['兒童姓名','姓名','學生姓名']); if(ni===-1) return [];
  const ai=findC(hd,['年齡','歲數','足歲']);
  const gradeCols=detectGradeCols(hd);
  const ci=findC(hd,['召會','單位','地區']);
  const si=findC(hd,['主日','主日情形']);
  const gi=findC(hd,['兒排','兒排情形']);
  const subI=hd.findIndex(h=>h.includes('小區'));
  const fSI=hd.findIndex((h,i)=>h.includes('身分')&&i>=13&&i<=15);
  const mSI=hd.findIndex((h,i)=>h.includes('身分')&&i>=15&&i<=17);
  return raw.slice(1).filter((row,ri)=>{ const n=String(row[ni]||'').trim(); return n&&!/^\d+$/.test(n); }).map((row,ri)=>{
    const name=String(row[ni]||'').trim();
    const age=parseFloat(String(row[ai]||'').replace(/[^0-9.]/g,''));
    const gradeFromHdr=gradeCols.length?gradeFromRow(row,gradeCols):null;
    let church=String(row[ci]||sn||'').trim();
    if(church.includes('大區')&&subI!==-1){ const sv=String(row[subI]||'').replace(/\(.*?\)|（.*?）/g,'').trim(); if(sv&&sv!=='---'&&!/^\d/.test(sv)) church=sv; }
    const m=ALL_KNOWN.find(s=>church.includes(s)); if(m) church=m;
    const fS=fSI!==-1&&isSaved(row[fSI]), mS=mSI!==-1&&isSaved(row[mSI]);
    const parentStatus=fS&&mS?'聖徒':fS||mS?'一方聖徒':'福朋';
    const sv=String(row[si]||''),gv=String(row[gi]||'');
    let lifeLevel='幾乎不來';
    if(sv.includes('經常')||gv.includes('經常')||parseInt(sv)>=3||parseInt(gv)>=3) lifeLevel='穩定';
    else if(sv.includes('偶爾')||gv.includes('偶爾')||parseInt(sv)>0||parseInt(gv)>0) lifeLevel='偶爾';
    const grade=gradeFromHdr||mapGrade(age);
    if(grade===null) return null;
    return {id:`c${ri}`,name,grade,church,lifeLevel,parentStatus};
  }).filter(r=>r!==null);
}

// ════ 載入 XLSX ════
async function loadX(){ if(window.XLSX) return window.XLSX; return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=()=>res(window.XLSX); s.onerror=rej; document.head.appendChild(s); }); }

async function handleFile(input){
  const file=input.files[0]; if(!file) return;
  try {
    const XLSX=await loadX();
    const reader=new FileReader();
    reader.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const hasT=CENSUS_TARGET.some(s=>wb.SheetNames.includes(s));
      const sheets=hasT?wb.SheetNames.filter(s=>CENSUS_TARGET.includes(s)):wb.SheetNames;
      let nc=0;
      sheets.forEach(sn=>{ const c=parseCensus(wb.Sheets[sn],sn,XLSX); if(c.length){ const m=new Map(); [...censusData,...c].forEach(r=>m.set(r.name,r)); censusData=Array.from(m.values()); nc+=c.length; } });
      alert(`✅ 普查匯入完成！共 ${nc} 筆`);
      input.value=''; initSelectors(); renderCensus();
    };
    reader.readAsBinaryString(file);
  } catch(err){ alert('解析失敗：'+err.message); }
}

async function importGS(){
  const url=document.getElementById('sheet-url').value;
  const match=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(!match){ alert('連結格式錯誤'); return; }
  try {
    const XLSX=await loadX();
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${match[1]}/export?format=xlsx`);
    if(!res.ok) throw new Error('無法存取，請確認分享權限');
    const buf=await res.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const hasT=CENSUS_TARGET.some(s=>wb.SheetNames.includes(s));
    const sheets=hasT?wb.SheetNames.filter(s=>CENSUS_TARGET.includes(s)):wb.SheetNames;
    let nc=0;
    sheets.forEach(sn=>{ const c=parseCensus(wb.Sheets[sn],sn,XLSX); if(c.length){ const m=new Map(); [...censusData,...c].forEach(r=>m.set(r.name,r)); censusData=Array.from(m.values()); nc+=c.length; } });
    document.getElementById('sheet-modal').classList.remove('open');
    alert(`✅ 同步完成！共 ${nc} 筆`);
    initSelectors(); renderCensus();
  } catch(err){ alert(err.message); }
}

// ════ UI ════
function initSelectors(){
  const zs=document.getElementById('zone-sel');
  zs.innerHTML='<option value="全部地區">全部區域</option>';
  Object.keys(CARE_ZONES).forEach(z=>{ const o=document.createElement('option'); o.value=z; o.textContent=z; zs.appendChild(o); });
}
function onZoneChange(){
  const zone=gSelZ();
  const wrap=document.getElementById('sub-wrap'), ss=document.getElementById('sub-sel');
  if(zone==='全部地區'){ wrap.style.display='none'; }
  else {
    wrap.style.display='flex';
    ss.innerHTML=`<option value="全區">全${zone}</option>`;
    (CARE_ZONES[zone]||[]).forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; ss.appendChild(o); });
    if(zone==='嘉義照顧區') CHIAYI_SUBS.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent='嘉義市─'+s; ss.appendChild(o); });
  }
  renderCensus();
}
function setMode(m){ curMode=m; document.getElementById('m-ch').classList.toggle('active',m==='charts'); document.getElementById('m-tbl').classList.toggle('active',m==='table'); renderCensus(); }
function clearAll(){ if(!confirm('確定清空所有數據？')) return; censusData=[]; renderCensus(); }

// ════ Charts ════
const dc = id => { if(charts[id]){ charts[id].destroy(); delete charts[id]; } };
function barC(id,labels,datasets,opts={}){
  dc(id);
  charts[id]=new Chart(document.getElementById(id).getContext('2d'),{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f1f5f9'}},...(opts.scales||{})}}});
}
function hbarC(id,labels,data,color){
  dc(id);
  charts[id]=new Chart(document.getElementById(id).getContext('2d'),{type:'bar',data:{labels,datasets:[{data,backgroundColor:color,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f1f5f9'},ticks:{font:{size:9}}},y:{grid:{display:false},ticks:{font:{size:9}}}}}});
}
function pieC(id,labels,data,colors){ dc(id); charts[id]=new Chart(document.getElementById(id).getContext('2d'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'white'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}}); }

// ════ Render Census ════
function renderCensus(){
  const d=filtCensus(), has=censusData.length>0;
  document.getElementById('stat-value').textContent=d.length;
  document.getElementById('cen-empty').style.display=has?'none':'block';
  document.getElementById('cen-cnt').style.display=has?'block':'none';
  if(!has) return;
  document.getElementById('cen-ch').style.display=curMode==='charts'?'block':'none';
  document.getElementById('cen-tbl').style.display=curMode==='table'?'block':'none';
  if(curMode==='charts'){
    const dKnown=d.filter(r=>r.grade!=='未知');
    const go=g=>g==='學齡前'?0:g.includes('年級')?parseInt(g):g==='國一'?10:11;
    const grades=[...new Set(dKnown.map(r=>r.grade))].sort((a,b)=>go(a)-go(b));
    barC('c-grade',grades,[{data:grades.map(g=>dKnown.filter(r=>r.grade===g).length),backgroundColor:'#3b82f6',borderRadius:4}]);
    let churchLabels, churchData;
    if(gSelZ()==='全部地區'){
      const zm={};
      Object.keys(CARE_ZONES).forEach(z=>{ zm[z]=0; });
      dKnown.forEach(r=>{ const z=getZone(r.church); if(zm[z]!==undefined) zm[z]++; else zm[z]=(zm[z]||0)+1; });
      const zsrt=Object.entries(zm).sort((a,b)=>b[1]-a[1]);
      churchLabels=zsrt.map(x=>x[0]); churchData=zsrt.map(x=>x[1]);
    } else {
      const cm={}; dKnown.forEach(r=>{cm[r.church]=(cm[r.church]||0)+1;});
      const srt=Object.entries(cm).sort((a,b)=>b[1]-a[1]).slice(0,20);
      churchLabels=srt.map(x=>x[0]); churchData=srt.map(x=>x[1]);
    }
    document.getElementById('church-title').textContent=gSelZ()==='全部地區'?'各照顧區人數':'各召會人數';
    document.getElementById('church-sub').textContent=gSelZ()==='全部地區'?'依照顧區彙總':'Top 20';
    hbarC('c-church',churchLabels,churchData,'#10b981');
    const st=dKnown.filter(r=>r.lifeLevel==='穩定').length,oc=dKnown.filter(r=>r.lifeLevel==='偶爾').length,ra=dKnown.filter(r=>r.lifeLevel==='幾乎不來').length;
    pieC('c-stable',['穩定','偶爾','幾乎不來'],[st,oc,ra],['#10b981','#f59e0b','#ef4444']);
    document.getElementById('ple').innerHTML=[['穩定',st,'#10b981'],['偶爾',oc,'#f59e0b'],['幾乎不來',ra,'#ef4444']].map(([n,v,c])=>`<span><span class="pd" style="background:${c}"></span>${n} (${v})</span>`).join('');
    const ps=['聖徒','一方聖徒','福朋'];
    barC('c-parent',ps,[{label:'穩定',data:ps.map(p=>dKnown.filter(r=>r.parentStatus===p&&r.lifeLevel==='穩定').length),backgroundColor:'#10b981',stack:'a'},{label:'偶爾',data:ps.map(p=>dKnown.filter(r=>r.parentStatus===p&&r.lifeLevel==='偶爾').length),backgroundColor:'#f59e0b',stack:'a'},{label:'幾乎不來',data:ps.map(p=>dKnown.filter(r=>r.parentStatus===p&&r.lifeLevel==='幾乎不來').length),backgroundColor:'#ef4444',stack:'a'}]);
    barC('c-gloss',grades,[{label:'穩定',data:grades.map(g=>dKnown.filter(r=>r.grade===g&&r.lifeLevel==='穩定').length),backgroundColor:'#10b981',stack:'a'},{label:'偶爾',data:grades.map(g=>dKnown.filter(r=>r.grade===g&&r.lifeLevel==='偶爾').length),backgroundColor:'#f59e0b',stack:'a'},{label:'幾乎不來',data:grades.map(g=>dKnown.filter(r=>r.grade===g&&r.lifeLevel==='幾乎不來').length),backgroundColor:'#ef4444',stack:'a'}]);
  } else {
    document.getElementById('cen-tbody').innerHTML=filtCensus().filter(r=>r.grade!=='未知').map(r=>`<tr><td><strong>${r.name}</strong></td><td>${r.grade}</td><td>${r.church}</td><td><span class="badge ${r.lifeLevel==='穩定'?'b-s':r.lifeLevel==='偶爾'?'b-o':'b-r'}">${r.lifeLevel}</span></td><td>${r.parentStatus}</td></tr>`).join('');
  }
}

// ── 初始化 ──
initSelectors(); renderCensus();
</script>
</body>
</html>
